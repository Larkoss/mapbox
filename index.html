<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8" />
    <title>Map Box</title>
    <!-- Mapbox api -->
    <meta name="viewport" content="initial-scale=1,maximum-scale=1,user-scalable=no" />
    <script src="https://api.mapbox.com/mapbox-gl-js/v2.0.0/mapbox-gl.js"></script>
